<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Test Case - Automação</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <h1>Análise de Usuários</h1>

    <h2>Usuários</h2>
    <select id="userSelect">
      <option value="">Selecione um usuário</option>
    </select>

    <h2>Filtros</h2>

    <label>Mínimo de caracteres do post:</label>
    <input type="number" id="minChars" />

    <br /><br />

    <label>Mínimo de posts para ser ativo:</label>
    <input type="number" id="minPosts" />

    <h2>Resultados</h2>
    <div id="results"></div>

    <h2>Ações</h2>
    <button id="generateReport">Gerar Relatório</button>
    <button id="sendReport">Enviar Relatório</button>

    <br /><br />

    <label>URL do Google Apps Script:</label>
    <input
      type="text"
      id="sheetsUrl"
      placeholder="Cole aqui a URL do Web App"
      style="width: 400px"
    />
    <button id="sendToSheets">Enviar para Google Sheets</button>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
